    <style>
        *{
        margin: 0;
        padding: 0;
        font-family: Verdana, Geneva, Tahoma, sans-serif;
    }
    @import url('https://fonts.googleapis.com/css2?family=Righteous&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Kaushan+Script&display=swap');
.bg{
    position: absolute;
    justify-content: center;
    background-image: linear-gradient(to right, red , rgba(246, 124, 124, 0.995));
    width: 100%;
    height: 10%;
}

#zom{
    position: relative;
    font-size: 2em;
    color: #fff;
    font-family: 'Raleway', sans-serif;
    font-weight: 800;
    text-transform: uppercase;
    left: -42.5%;
    top: 20%;
}


        header{
            position: absolute;
            top: 0;
            left: 0;
            width: 100%; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10000;
        }

        header ul{
            display: flex;
            justify-content: center;
            align-items: center;
        }

        header ul li{
            position: relative;
            list-style: none;
            margin-left: 40px;
            padding: 13px;
            font-size: 1.25em;
            left: 36.5%;
            top: 4px;
        }

        header ul li a{
            text-decoration: none;
            color: #fff;
            padding: 6px 15px;
            font-family: 'Righteous', cursive;
        }
        .active{
            color: rgb(255, 149, 0);
            border-radius: 20px;
        }

        header ul li a:hover{
            color: rgb(255, 149, 0);
            transition: 350ms;
        }

        .order img{
            position: absolute;
            top: 196%;
            left: -1%;
        }
        .ord{
    position: absolute;
    font-size: 4em;
    color: #2c2b2c;
    font-family: 'Raleway', sans-serif;
    font-weight: 800;
    text-transform: uppercase;
    top: 534%;
    left: 33.2%;
}
