<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300&family=Righteous&display=swap" rel="stylesheet">
    <style>
         *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    @import url('https://fonts.googleapis.com/css2?family=Righteous&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Kaushan+Script&display=swap');
.bg{
    position: absolute;
    justify-content: center;
    background-image: linear-gradient(to right, red , rgba(246, 124, 124, 0.995));
    width: 100%;
    height: 10%;
}

#zom{
    position: relative;
    font-size: 2em;
    color: #fff;
    font-family: 'Raleway', sans-serif;
    font-weight: 800;
    text-transform: uppercase;
    left: -42.5%;
    top: 20%;
}


        header{
            position: absolute;
            top: 0;
            left: 0;
            width: 100%; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10000;
        }

        header ul{
            display: flex;
            justify-content: center;
            align-items: center;
        }

        header ul li{
            position: relative;
            list-style: none;
            margin-left: 40px;
            padding: 13px;
            font-size: 1.25em;
            left: 35%;
            top: 5px;

        }

        header ul li a{
            text-decoration: none;
            color: #fff;
            padding: 6px 15px;
            font-family: 'Righteous', cursive;
        }
        .active{
            color:  rgb(255, 187, 0);
            border-radius: 20px;
        }

        header ul li a:hover{
            color: rgb(255, 187, 0);
            transition: 350ms;
        }

        form {
            height: 300px;
            width: 820px;
            background-color: rgba(255, 255, 255, 0.13);
            position: absolute;
            transform: translate(-50%, -50%);
            top: 55%;
            left: 50%;
            border-radius: 10px;
            backdrop-filter: blur(30px);
            border: 2px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 40px rgba(8, 7, 16, 0.6);
            padding: 50px 35px;
         }
        form * {
          font-family: "Poppins", sans-serif;
          color: #000000;
          letter-spacing: 0.5px;
          outline: none;
          border: none;
        }

        form h3 {
          font-size: 32px;
          font-weight: 500;
          line-height: 42px;
          text-align: center;
          left: 41%;
        }

        label {
          display: block;
          margin-top: 30px;
          font-size: 16px;
          font-weight: 500;
        }
        #upi{
            display: block;
            height: 50px;
            width: 43.7%;
            background-color: rgba(255, 255, 255, 0.3);
            border-radius: 3px;
            padding: 0 10px;
            margin-top: 8px;
            font-size: 14px;
            font-weight: 300;
        }
        #otp{
            top: 35.5%;
            left: 55.4%;
            position: absolute;
            height: 50px;
            width: 40%;
            background-color: rgba(255, 255, 255, 0.3);
            border-radius: 3px;
            padding: 0 10px;
            margin-top: 8px;
            font-size: 14px;
            font-weight: 300;
        }
        #name{
            top: 73.5%;
            left: 55.4%;
            position: absolute;
            height: 50px;
            width: 40%;
            background-color: rgba(255, 255, 255, 0.3);
            border-radius: 3px;
            padding: 0 10px;
            margin-top: 8px;
            font-size: 14px;
            font-weight: 300;
        }
        #crd{
            top: 55.5%;
            left: 55.4%;
            position: absolute;
        }
        ::placeholder {
          color: #1b1b1b;
        }


        button {
          margin-top: 50px;
          width: 100%;
          background-color: #ffffff;
          color: #080710;
          padding: 15px 0;
          font-size: 18px;
          font-weight: 600;
          border-radius: 5px;
          cursor: pointer;
        }
        h3{
            position: absolute;
            top: 5%;
        }
        #bg{
            width: 100vw;
            height: 109.7vh;
            position: absolute;
            z-index: -1;
            top: -10%;
        }
        #exp
         {
          position: absolute;
          margin-top: 30px;
          font-size: 16px;
          font-weight: 500;
          top: 17.5%;
          left: 55.6%;
        }
        .dropdown {
            position: relative;
            display: inline-block;
        }
        .dropdown-content {
          display: none;
          position: absolute;
          background-color: #f1f1f1;
          min-width: 130px;
          box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
          z-index: 1;
        }

        .dropdown-content a {
          color: black;
          padding: 12px 16px;
          text-decoration: none;
          display: block;
          text-align: center;
        }

        .dropdown-content a:hover {
            background-color: #ddd;
        }

        .dropdown:hover .dropdown-content {
            display: block;
        }

    </style>
</head>
<body>
    <div class="bg"> 
        <header>
            <ul>
                <li><a href="home.html">HOME</a></li>
                <li><a href="menu.html">MENU</a></li>
                <li><a href="offers.html">OFFERS</a></li>
                <li><a href="history.html">HISTORY</a></li>
                <li><a href="LOGIN.html">LOGIN</a></li>
                <li><div class="dropdown"><a id="parent" href="payment.html">PAYMENT</a>
                    <div class="dropdown-content">
                      <a href="upi.html">UPI</a>
                      <a href="payment.html">CARD</a>
                    </div></div></li>
            </ul>
        </header>   
        <h1 id="center" id="zom">Z o m a t o</h1>
        </div>
        <img src="images/payment.jpg" id="bg">
        <form>
            <h3>Payment</h3>
          
            <label for="upi">UPI</label>
            <input type="text" placeholder="yourid@yourbank" id="upi">
          
            <label for="otp" id="exp">OTP</label>
            <input type="number" id="otp">
          
            <button>Confirm Payment</button>
            </form>
</body>
</html>
